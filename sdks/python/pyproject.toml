[project]
name = "sealstack"
version = "0.4.0"
description = "SealStack Python SDK — typed REST client for the SealStack gateway."
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "SealStack Contributors" }]
keywords = [
    "sealstack",
    "rag",
    "retrieval",
    "mcp",
    "model-context-protocol",
    "embeddings",
    "vector-search",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.urls]
Homepage      = "https://github.com/bwiemz/sealstack/tree/main/sdks/python"
Documentation = "https://github.com/bwiemz/sealstack/tree/main/sdks/python#readme"
Repository    = "https://github.com/bwiemz/sealstack"
Issues        = "https://github.com/bwiemz/sealstack/issues"
Changelog     = "https://github.com/bwiemz/sealstack/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.6",
    "datamodel-code-generator>=0.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
include = ["sealstack"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"
