[project]
name = "signet"
version = "0.1.0"
description = "Signet Python SDK"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.8",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["signet"]

[tool.basedpyright]
# Dependencies (httpx, pydantic) are declared above and installed via
# `pip install -e .` before the SDK is used. Until then, suppress the
# missing-import and unknown-type noise so the scaffold stays clean.
reportMissingImports            = "none"
reportUnknownVariableType       = "none"
reportUnknownMemberType         = "none"
reportUntypedBaseClass          = "none"
reportUnannotatedClassAttribute = "none"
reportExplicitAny               = "none"
