[package]
name         = "signet-vectorstore"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
description  = "Vector-store abstraction + in-memory and Qdrant backends for Signet."

[lints]
workspace = true

[dependencies]
signet-common    = { path = "../signet-common" }

async-trait   = "0.1"
serde         = { workspace = true, features = ["derive"] }
serde_json    = { workspace = true }
thiserror     = { workspace = true }
tokio         = { workspace = true, features = ["sync", "rt"] }
tracing       = { workspace = true }
ulid          = { workspace = true }

# Concurrent data structures for the in-memory backend.
dashmap       = "6.1"

# Qdrant client — feature-gated so the trait + memory impl can be used without it.
qdrant-client = { version = "1.12", optional = true }

[features]
default = ["memory"]
memory  = []
qdrant  = ["dep:qdrant-client"]
all     = ["memory", "qdrant"]

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
