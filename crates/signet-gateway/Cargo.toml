[package]
name         = "signet-gateway"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
description  = "MCP, REST, and OAuth gateway for Signet."

[lints]
workspace = true

[[bin]]
name = "signet-gateway"
path = "src/bin/server.rs"

[dependencies]
tokio           = { workspace = true }
axum            = { workspace = true }
tower           = { workspace = true }
tower-http      = { workspace = true }
hyper           = { workspace = true }
serde           = { workspace = true }
serde_json      = { workspace = true }
thiserror       = { workspace = true }
anyhow          = { workspace = true }
tracing         = { workspace = true }
tracing-subscriber = { workspace = true }
uuid            = { workspace = true }
ulid            = { workspace = true }
time            = { workspace = true }
async-trait     = "0.1"
dashmap         = "6"
futures         = "0.3"
jsonwebtoken    = "9.2"
reqwest         = { workspace = true }
# Internal crates
signet-common                  = { path = "../signet-common" }
signet-csl                     = { path = "../signet-csl" }
signet-engine                  = { path = "../signet-engine", features = ["reranker", "wasm-policy"] }
signet-vectorstore             = { path = "../signet-vectorstore", features = ["qdrant"] }
signet-embedders               = { path = "../signet-embedders", features = ["stub", "openai", "voyage"] }
signet-connector-sdk           = { path = "../signet-connector-sdk" }
signet-ingest                  = { path = "../signet-ingest" }
signet-connector-local-files   = { path = "../../connectors/local-files" }
signet-connector-github        = { path = "../../connectors/github" }
signet-connector-slack         = { path = "../../connectors/slack" }

[dev-dependencies]
tokio           = { workspace = true, features = ["macros", "rt-multi-thread"] }
reqwest         = { workspace = true }
tempfile        = { workspace = true }
serde_json      = { workspace = true }
tower           = { workspace = true, features = ["util"] }
axum            = { workspace = true }
http-body-util  = "0.1"

[features]
default      = []
# Compile in the StubEngineFacade for integration tests of the gateway alone.
stub-engine  = []
