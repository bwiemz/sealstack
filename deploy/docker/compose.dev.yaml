services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: sealstack
      POSTGRES_USER: sealstack
      POSTGRES_DB: sealstack
    ports: ["5432:5432"]
    volumes: [sealstack_pg:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sealstack"]
      interval: 2s

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: [sealstack_qdrant:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 2s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.gateway
    ports: ["7070:7070"]
    environment:
      SEALSTACK_DATABASE_URL: postgres://sealstack:sealstack@postgres:5432/sealstack
      SEALSTACK_QDRANT_URL: http://qdrant:6334
      SEALSTACK_REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      qdrant:   { condition: service_healthy }
      redis:    { condition: service_started }

volumes:
  sealstack_pg:
  sealstack_qdrant:
