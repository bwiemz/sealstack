{{- if .Values.secret.create -}}
{{- /*
  Helm-managed Secret. NOT recommended for production — credentials
  end up in the Helm release history. Prefer setting `secret.create=false`
  and managing the Secret out-of-band (e.g. external-secrets, sealed-secrets).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sealstack.secretName" . }}
  labels: {{- include "sealstack.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $k, $v := .Values.secret.values }}
  {{- if $v }}
  {{ $k }}: {{ $v | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end -}}
