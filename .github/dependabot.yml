version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
  # Single npm entry covers the pnpm workspace declared in
  # pnpm-workspace.yaml (console + sdks/typescript). Dependabot reads the
  # root pnpm-lock.yaml and proposes bumps for any member package. Don't
  # add per-member entries here — they create duplicate PRs against the
  # same lockfile.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
