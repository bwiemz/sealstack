name: deploy-docs

# Publishes the Starlight site at `docs/` to Cloudflare Pages on every push
# to `main` that touches doc sources. Pull requests get preview deploys on a
# unique URL so the reviewer can click-through before merging.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=sealstack-docs
            --branch=${{ github.head_ref || github.ref_name }}
