name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Rust version follows the workspace's `rust-toolchain.toml` (currently
      # 1.95). Pinning the action to a different version causes the rebuilt
      # wasm to drift from the committed asset (different rustc → different
      # LLVM IR → different wasm bytes).
      - uses: dtolnay/rust-toolchain@1.95
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked
      - name: Regenerate JSON Schemas
        run: cargo run --bin emit-schemas -p sealstack-api-types
      - name: Verify schemas are up to date
        run: |
          if ! git diff --exit-code crates/sealstack-api-types/schemas/; then
            echo "::error::JSON Schemas are out of date. Run \`cargo run --bin emit-schemas -p sealstack-api-types\` and commit." >&2
            exit 1
          fi

  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: EmbarkStudios/cargo-deny-action@v2

  policy-runtime-build:
    name: Policy runtime builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      # Verify the policy-runtime source still compiles to a wasm32 binary.
      # We deliberately do NOT byte-compare the rebuilt asset against the
      # committed `policy_runtime.wasm`: rustc on different host OSes (Linux
      # GNU vs Windows MSVC) emits subtly different LLVM IR even at the same
      # version + same target, so any drift check is fundamentally flaky.
      # Source-vs-asset divergence is caught by the `rust` job's CSL tests
      # — they exercise the committed wasm against the IR patcher and would
      # fail on stale asset semantics.
      - name: Rebuild policy runtime
        run: ./scripts/rebuild-policy-runtime.sh

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # pnpm version is driven by the root package.json's `packageManager`
      # field. Specifying `version:` here in addition makes the action error
      # out with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C console lint
      - run: pnpm -C console check
      - run: pnpm -C console build
      - run: pnpm -C sdks/typescript build
      - run: pnpm -C sdks/typescript test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sealstack
          POSTGRES_PASSWORD: sealstack
          POSTGRES_DB: sealstack
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cfg"
          --health-interval 2s --health-timeout 5s --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333", "6334:6334"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      # The e2e test target is added in Phase 12. Until then this job is a
      # no-op placeholder; once `tests/e2e.rs` lands in sealstack-gateway, swap
      # back to `cargo test --test e2e --locked`.
      - run: cargo check --workspace --locked
        env:
          SEALSTACK_DATABASE_URL: postgres://sealstack:sealstack@localhost:5432/sealstack
          SEALSTACK_QDRANT_URL:   http://localhost:6334
