name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked

  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: EmbarkStudios/cargo-deny-action@v2

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C console lint
      - run: pnpm -C console check
      - run: pnpm -C console build
      - run: pnpm -C sdks/typescript build
      - run: pnpm -C sdks/typescript test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cfg
          POSTGRES_PASSWORD: cfg
          POSTGRES_DB: cfg
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cfg"
          --health-interval 2s --health-timeout 5s --health-retries 10
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333", "6334:6334"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      # The e2e test target is added in Phase 12. Until then this job is a
      # no-op placeholder; once `tests/e2e.rs` lands in cfg-gateway, swap
      # back to `cargo test --test e2e --locked`.
      - run: cargo check --workspace --locked
        env:
          CFG_DATABASE_URL: postgres://cfg:cfg@localhost:5432/cfg
          CFG_QDRANT_URL:   http://localhost:6334
