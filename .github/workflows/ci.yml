name: CI
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
        with: { components: rustfmt, clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked
      - name: Regenerate JSON Schemas
        run: cargo run --bin emit-schemas -p sealstack-api-types
      - name: Verify schemas are up to date
        run: |
          if ! git diff --exit-code crates/sealstack-api-types/schemas/; then
            echo "::error::JSON Schemas are out of date. Run \`cargo run --bin emit-schemas -p sealstack-api-types\` and commit." >&2
            exit 1
          fi

  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - uses: EmbarkStudios/cargo-deny-action@v2

  policy-runtime-drift:
    name: Policy runtime asset matches source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Rebuild policy runtime
        run: ./scripts/rebuild-policy-runtime.sh
      - name: Check for drift
        run: |
          if ! git diff --exit-code crates/sealstack-csl/assets/policy_runtime.wasm; then
            echo "policy_runtime.wasm is out of date; run ./scripts/rebuild-policy-runtime.sh and commit" >&2
            exit 1
          fi

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C console lint
      - run: pnpm -C console check
      - run: pnpm -C console build
      - run: pnpm -C sdks/typescript build
      - run: pnpm -C sdks/typescript test

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sealstack
          POSTGRES_PASSWORD: sealstack
          POSTGRES_DB: sealstack
        ports: ["5432:5432"]
        # The health-check user must match POSTGRES_USER. The previous `-U cfg`
        # silently failed every probe, so the job ran before postgres was
        # ready. With the e2e tests now invoked here (not just `cargo check`),
        # that race would surface as connection-refused / migration timing
        # flakes, so it's fixed in the same commit.
        options: >-
          --health-cmd "pg_isready -U sealstack -d sealstack"
          --health-interval 2s --health-timeout 5s --health-retries 15
      # Qdrant deliberately omitted: the gateway e2e tests construct an
      # `InMemoryStore` directly (see `build_test_app` in end_to_end.rs) and
      # set `qdrant_url: ""` in the gateway config. Adding a Qdrant service
      # here just so the env var has a target adds boot time without exercise
      # value. Re-add when an actual test needs it.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      # End-to-end tests in sealstack-gateway are `#[ignore]`-gated because
      # they need a running Postgres. Now that the job has one, opt them in.
      # `--test-threads=1` because all three tests share the same Postgres
      # instance and register `examples.Doc` into the same `schemas` table.
      - name: Run gateway e2e tests
        run: cargo test -p sealstack-gateway --test end_to_end --locked -- --ignored --test-threads=1
        env:
          SEALSTACK_DATABASE_URL: postgres://sealstack:sealstack@localhost:5432/sealstack
          # Surface tracing output from the gateway/engine when a test fails so
          # CI logs are useful for triage. `info` keeps log volume reasonable.
          RUST_LOG: info
