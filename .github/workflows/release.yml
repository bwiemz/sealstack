name: release
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # Drives the versioning + CHANGELOG via release-please. A tag push bypasses
  # this job and goes straight to the binary / image builds.
  release-please:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: rust

  # One build per target, uploaded to the tag's release as an artifact.
  cli-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sealstack-linux-x86_64.tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: sealstack-linux-aarch64.tar.gz
            cross: true
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: sealstack-macos-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: sealstack-macos-aarch64.tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: sealstack-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release -p sealstack-cli --target ${{ matrix.target }}
          else
            cargo build --release -p sealstack-cli --target ${{ matrix.target }}
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/${{ matrix.artifact }}" sealstack
          cd -

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/sealstack.exe `
            -DestinationPath ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true

  # Gateway container image — single tag build, multi-arch via buildx.
  gateway-image:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:latest
            ghcr.io/${{ github.repository }}/gateway:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
