name: release
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write
  pull-requests: write
  # `id-token: write` lets the publish jobs use OIDC trusted-publisher
  # auth against npm + PyPI when those orgs are configured. Falls back
  # to long-lived `NPM_TOKEN` / `PYPI_API_TOKEN` if not. Both jobs
  # short-circuit cleanly when neither secret nor OIDC is available.
  id-token: write

jobs:
  # Drives the versioning + CHANGELOG via release-please. A tag push bypasses
  # this job and goes straight to the binary / image builds.
  release-please:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          release-type: rust

  # Pre-create the GitHub Release so the matrix upload jobs don't race on
  # `softprops/action-gh-release` trying to create the same tag concurrently
  # (which 4 of 5 jobs lost in the v0.3.0 run — "already_exists" on tag_name).
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  # One build per target, uploaded to the tag's release as an artifact.
  cli-binaries:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sealstack-linux-x86_64.tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: sealstack-linux-aarch64.tar.gz
            cross: true
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: sealstack-macos-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: sealstack-macos-aarch64.tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: sealstack-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build CLI
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release -p sealstack-cli --target ${{ matrix.target }}
          else
            cargo build --release -p sealstack-cli --target ${{ matrix.target }}
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/${{ matrix.artifact }}" sealstack
          cd -

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/sealstack.exe `
            -DestinationPath ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true

  # TypeScript SDK to npm. Tag-triggered. Skips cleanly if no NPM_TOKEN
  # secret is configured AND no OIDC trusted publisher is wired — the
  # job emits a noisy warning in that case so the omission is visible
  # at the GH Actions UI.
  publish-ts-sdk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    # Job-level env exposes the secret as a normal env var so step-level
    # `if: env.NPM_TOKEN != ''` works. Putting `env: NPM_TOKEN: secrets...`
    # on a step is too late — `if:` evaluates before the step's `env:`.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C sdks/typescript test
      - run: pnpm -C sdks/typescript build
      # pnpm publish forwards extra flags to `npm publish`; `--no-git-checks`
      # is a pnpm-only flag and `npm publish` rejects it (the v0.3.0 run hit
      # `npm error code EUSAGE`). Drop it on the dry-run; the real publish
      # still wants it so pnpm doesn't refuse on a dirty release tag worktree.
      - name: Dry-run publish (always)
        run: pnpm -C sdks/typescript publish --dry-run
      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        run: pnpm -C sdks/typescript publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
      - name: Notice when publish is skipped
        if: env.NPM_TOKEN == ''
        run: |
          echo "::warning::NPM_TOKEN secret not set; skipping npm publish."
          echo "::warning::Configure either an NPM_TOKEN repo secret OR an npm trusted publisher and rerun the release workflow."

  # Python SDK to PyPI. Tag-triggered. Uses OIDC trusted-publisher first;
  # falls back to PYPI_API_TOKEN. Skips cleanly when neither is available.
  publish-py-sdk:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install build deps
        run: pip install build twine
      - name: Build sdist + wheel
        working-directory: sdks/python
        run: python -m build
      - name: Twine check
        working-directory: sdks/python
        run: python -m twine check dist/*
      - name: Publish (OIDC trusted publisher)
        if: ${{ vars.PYPI_TRUSTED_PUBLISHER == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist
      - name: Publish (API token fallback)
        if: vars.PYPI_TRUSTED_PUBLISHER != 'true' && env.PYPI_API_TOKEN != ''
        working-directory: sdks/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
      - name: Notice when publish is skipped
        if: vars.PYPI_TRUSTED_PUBLISHER != 'true' && env.PYPI_API_TOKEN == ''
        run: |
          echo "::warning::No PyPI publish credentials configured."
          echo "::warning::Set the PYPI_TRUSTED_PUBLISHER variable to 'true' to use OIDC, OR set the PYPI_API_TOKEN secret for token auth."

  # api-types crate to crates.io. Lets downstream consumers depend on
  # `sealstack-api-types = "0.3"` without pulling the full monorepo.
  # Requires a CARGO_REGISTRY_TOKEN secret with publish rights.
  publish-api-types-crate:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - name: cargo publish dry-run
        run: cargo publish -p sealstack-api-types --dry-run --allow-dirty
      - name: cargo publish
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish -p sealstack-api-types
      - name: Notice when publish is skipped
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: |
          echo "::warning::CARGO_REGISTRY_TOKEN secret not set; skipping cargo publish."
          echo "::warning::Generate a crates.io API token with publish scope and add as a repo secret."

  # SBOM + third-party notices attached to the GitHub Release.
  release-attestations:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx
      # cargo-cyclonedx ≥0.5 emits `bom.json` next to each crate's Cargo.toml
      # by default. The old `--output-pattern bom` flag was removed; we just
      # let it write per-crate boms and then collect them under artifacts/.
      - name: Emit CycloneDX SBOM
        run: cargo cyclonedx --format json --all
      - name: Collect SBOMs
        run: |
          mkdir -p artifacts
          find . -name "bom.json" -not -path "./artifacts/*" -print0 | \
            while IFS= read -r -d '' f; do
              # Use the crate dir name as the artifact filename so paths don't collide.
              crate=$(basename "$(dirname "$f")")
              cp "$f" "artifacts/${crate}-bom.json"
            done
      - name: Third-party notices
        run: |
          if [ -x scripts/generate-third-party-notices.sh ]; then
            ./scripts/generate-third-party-notices.sh > artifacts/THIRD_PARTY_NOTICES.md || true
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*

  # Gateway container image — single tag build, multi-arch via buildx.
  gateway-image:
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/gateway:latest
            ghcr.io/${{ github.repository }}/gateway:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
