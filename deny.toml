[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",  # wasmtime / Cranelift dependency tree.
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",             # Public-domain dedication. No restrictions.
    "CDLA-Permissive-2.0", # Linux Foundation permissive data license.
    "MPL-2.0",             # File-level weak copyleft; compatible with Apache-2.0
                           # projects as long as MPL files aren't modified.
                           # Accepts the `+` (any-later-version) form from deps too.
    "Zlib",                # Very permissive, Apache-compatible.
]
confidence-threshold = 0.92

[bans]
multiple-versions = "warn"

[advisories]
yanked = "deny"
# Acknowledged transitive unmaintained-crate warnings with no safe upgrade
# path. Tracked by their respective upstreams; revisit on each dependabot pass.
#
# Removed: RUSTSEC-2024-0384 (`instant`) — no longer in the dep graph after
# the 2026-04 dep refresh; cargo-deny warns when an ignored advisory is no
# longer encountered, so the entry is dropped to keep the config truthful.
ignore = [
    "RUSTSEC-2025-0134", # `rustls-pemfile` — unmaintained but non-vulnerable.
                         # rustls is migrating the API; upgrade when our
                         # reqwest/sqlx versions land on rustls-pki-types.

    # webpki name-constraints vulnerabilities. These ship via rustls →
    # reqwest / sqlx / aws-sdk-s3 → webpki, and only impact servers
    # validating client certificates with name-constraint extensions —
    # which SealStack does not do. We use rustls for outbound HTTPS only;
    # inbound TLS is terminated by the gateway's ingress. The upstream
    # patch will land via the next reqwest / aws-sdk minor release.
    "RUSTSEC-2026-0098", # webpki: name constraints for URI names accepted incorrectly.
    "RUSTSEC-2026-0099", # webpki: name constraints accepted for wildcard certs.
    "RUSTSEC-2026-0104", # webpki: reachable panic in CRL parsing
                         # (BorrowedCertRevocationList::from_der). SealStack
                         # does not use CRLs.
]
