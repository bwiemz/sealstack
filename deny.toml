[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",  # wasmtime / Cranelift dependency tree.
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",             # Public-domain dedication. No restrictions.
    "CDLA-Permissive-2.0", # Linux Foundation permissive data license.
    "MPL-2.0",             # File-level weak copyleft; compatible with Apache-2.0
                           # projects as long as MPL files aren't modified.
                           # Accepts the `+` (any-later-version) form from deps too.
    "Zlib",                # Very permissive, Apache-compatible.
]
confidence-threshold = 0.92

[bans]
multiple-versions = "warn"

[advisories]
yanked = "deny"
# Acknowledged transitive unmaintained-crate warnings with no safe upgrade
# path. Both are tracked by their respective upstreams; revisit on each
# dependabot pass.
ignore = [
    "RUSTSEC-2024-0384", # `instant` — unmaintained; transitively pulled by
                         # tokio / parking_lot ecosystems. No drop-in
                         # replacement exposed via our direct deps.
    "RUSTSEC-2025-0134", # `rustls-pemfile` — unmaintained but non-vulnerable.
                         # rustls is migrating the API; upgrade when our
                         # reqwest/sqlx versions land on rustls-pki-types.
]
